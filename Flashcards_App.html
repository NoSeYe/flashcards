
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oxford 3000 Flashcards</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            text-align: center;
            width: 90%;
            max-width: 500px;
        }
        .flashcard-container {
            perspective: 1000px;
            width: 100%;
            height: 300px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 15px;
        }
        .flashcard.flipped {
            transform: rotateY(180deg);
        }
        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            padding: 20px;
            box-sizing: border-box;
        }
        .front {
            background-color: #ffffff;
            color: #333;
        }
        .back {
            background-color: #4a90e2;
            color: white;
            transform: rotateY(180deg);
        }
        .word { font-size: 2.5em; font-weight: bold; margin-bottom: 10px; }
        .level { font-size: 1.2em; color: #666; }
        .thai { font-size: 1.8em; margin-bottom: 15px; }
        .example { font-style: italic; font-size: 1.1em; line-height: 1.4; }
        
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #333;
            color: white;
            transition: background 0.3s;
        }
        button:hover { background-color: #555; }
        .stats { margin-top: 15px; color: #777; }
        select { padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Oxford 3000 Flashcards</h1>
        
        <div style="margin-bottom: 15px;">

            <select id="pageSelect" onchange="jumpToPage()">

                <option value="2">Page 2</option>
                <option value="3">Page 3</option>
                <option value="4">Page 4</option>
                <option value="5">Page 5</option>
                <option value="6">Page 6</option>
                <option value="7">Page 7</option>
                <option value="8">Page 8</option>

        </div>

        <div class="flashcard-container" onclick="flipCard()">

                <div class="front">
                    <div class="word" id="frontWord">Word</div>
                    <div class="level" id="frontLevel">Level: A1</div>
                    <div id="frontGroup">n.</div>
                </div>
                <div class="back">
                    <div class="thai" id="backThai">Meaning</div>
                    <div class="example" id="backExample">Example sentence goes here.</div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="prevCard()">Previous</button>
            <button onclick="nextCard()">Next</button>
        </div>
        
        <div class="stats">
            Card <span id="currentIndex">1</span> of <span id="totalCards">0</span>
        </div>
    </div>
