
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oxford 3000 Flashcards</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            padding-top: 20px;
        }
        .container {
            text-align: center;
            width: 90%;
            max-width: 500px;
        }
        .flashcard-container {
            perspective: 1000px;
            width: 100%;
            height: 350px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 15px;
        }
        .flashcard.flipped { transform: rotateY(180deg); }
        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: white;
            border-radius: 15px;
            padding: 30px;
            box-sizing: border-box;
            border: 2px solid #ddd;
        }
        .back { transform: rotateY(180deg); background-color: #fff; }
        .word-container { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%;
            margin-bottom: 20px; 
        }
        .word { font-size: 2.5em; font-weight: bold; color: #333; }
        .speak-btn { 
            position: absolute;
            top: 15px;
            right: 15px;
            background: none; 
            border: none; 
            cursor: pointer; 
            padding: 10px; 
            border-radius: 50%; 
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
        }
        .speak-btn:hover { background-color: #f0f0f0; color: #333; }
        .speak-btn svg { width: 24px; height: 24px; fill: currentColor; }
        
        .level { font-size: 1.1em; color: #666; background: #eee; padding: 4px 12px; border-radius: 20px; margin-bottom: 10px; }
        .group { font-size: 0.9em; color: #888; font-style: italic; }
        .thai { font-size: 1.8em; color: #007bff; margin-bottom: 20px; font-weight: 500; }
        .example { font-size: 1em; color: #444; line-height: 1.5; font-style: italic; background: #f9f9f9; padding: 15px; border-left: 4px solid #007bff; border-radius: 4px; width: 100%; box-sizing: border-box; }
        
        .controls, .mastery-controls { display: flex; gap: 10px; justify-content: center; margin-top: 20px; width: 100%; }
        button {
            padding: 12px 25px;
            font-size: 1em;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #333;
            color: white;
            transition: all 0.2s;
        }
        button:hover { background-color: #555; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        
        .btn-know { background-color: #28a745; font-size: 1.2em; }
        .btn-dont-know { background-color: #dc3545; font-size: 1.2em; }
        .btn-know:hover { background-color: #218838; }
        .btn-dont-know:hover { background-color: #c82333; }
        
        .stats { margin-top: 10px; color: #555; font-weight: 500; }
        .is-mastered .front { border-color: #28a745; background-color: #f8fff9; }

        .export-section {
            margin-top: 30px;
            padding: 20px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        #exportArea {
            width: 100%;
            height: 80px;
            margin-top: 10px;
            display: none;
            font-family: monospace;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Oxford 3000 Flashcards</h1>
        
        <div style="margin-bottom: 20px;">
            Jump to Page: 
            <select id="pageSelect" onchange="jumpToPage()" style="padding: 8px; border-radius: 5px;">
                <!-- Pages will be populated by JS -->
            </select>
        </div>

        <div class="flashcard-container" onclick="flipCard()">
            <div class="flashcard" id="card">
                <div class="front">
                    <button class="speak-btn" onclick="speakWord(event)" title="Listen to pronunciation">
                        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    </button>
                    <div class="word-container">
                        <div class="word" id="frontWord">Word</div>
                    </div>
                    <div class="level" id="frontLevel">Level: A1</div>
                    <div class="group" id="frontGroup">n.</div>
                </div>
                <div class="back">
                    <div class="thai" id="backThai">Meaning</div>
                    <div class="example" id="backExample">Example sentence goes here.</div>
                </div>
            </div>
        </div>

        <div class="mastery-controls">
            <button class="btn-dont-know" onclick="markMastery(false); event.stopPropagation();">❌ I don't know</button>
            <button class="btn-know" onclick="markMastery(true); event.stopPropagation();">✅ I know this</button>
        </div>

        <div class="controls">
            <button onclick="prevCard(); event.stopPropagation();">Previous</button>
            <button onclick="nextCard(); event.stopPropagation();">Next</button>
        </div>
        
        <div class="stats">
            Card <span id="currentIndex">1</span> of <span id="totalCards">0</span>
            <br>
            Mastered: <span id="masteryCount">0</span>
        </div>

        <div class="export-section">
            <button onclick="exportProgress()">Generate Mastery Report</button>
            <p style="font-size: 0.8em; color: #777; margin-top: 10px;">Copy the text below and send it to Gemini to update your Progress Tracker.</p>
            <textarea id="exportArea" readonly></textarea>
        </div>
    </div>

    <script>
        const words = [{"word": "a, an", "pos": "indefinite article", "level": "A1", "thai": "หนึ่ง, ตัวหนึ่ง (ใช้กับคำนามทั่วไป)", "example": "A student must study hard for the IELTS exam."}, {"word": "abandon", "pos": "v.", "level": "B2", "thai": "ละทิ้ง, ปล่อย", "example": "abandon somebody, The baby had been abandoned by its mother."}, {"word": "ability", "pos": "n.", "level": "A2", "thai": "ความสามารถ", "example": "People with the disease may lose their ability to communicate."}, {"word": "able", "pos": "adj.", "level": "A2", "thai": "สามารถ", "example": "You must be able to speak French for this job."}, {"word": "about", "pos": "prep., adv.", "level": "A1", "thai": "เกี่ยวกับ, ประมาณ", "example": "The lecture was about global warming and its impact on agriculture."}, {"word": "above", "pos": "prep., adv.", "level": "A1", "thai": "เหนือ, สูงกว่า", "example": "The temperature is already above 30 degrees Celsius today."}, {"word": "abroad", "pos": "adv.", "level": "B2", "thai": "ในต่างประเทศ", "example": "to go/travel/live/study abroad "}, {"word": "absolute", "pos": "adj.", "level": "B2", "thai": "สมบูรณ์, แน่นอน", "example": "I've joined a class for absolute beginners."}, {"word": "absolutely", "pos": "adv.", "level": "B1", "thai": "อย่างแน่นอน, อย่างสิ้นเชิง", "example": "You're absolutely right."}, {"word": "academic", "pos": "adj.", "level": "B1", "thai": "ทางวิชาการ", "example": "high/low academic standards"}, {"word": "accept", "pos": "v.", "level": "A2", "thai": "ยอมรับ", "example": "He asked me to marry him and I accepted."}, {"word": "acceptable", "pos": "adj.", "level": "B2", "thai": "ยอมรับได้", "example": "Children must learn socially acceptable behaviour."}, {"word": "access", "pos": "n., v.", "level": "B1", "thai": "การเข้าถึง, เข้าถึง", "example": "Students have free access to the university library's online resources."}, {"word": "accident", "pos": "n.", "level": "A2", "thai": "อุบัติเหตุ", "example": "a car/road/traffic accident"}, {"word": "accompany", "pos": "v.", "level": "B2", "thai": "ไปเป็นเพื่อน, ประกอบกับ", "example": "accompany somebody/something + adv./prep., His wife accompanied him on the trip."}, {"word": "according to", "pos": "prep.", "level": "A2", "thai": "ตามที่, อ้างถึง", "example": "According to Mick, it's a great movie."}, {"word": "account", "pos": "n.", "level": "B1", "thai": "บัญชี, บรรยาย", "example": "I don't have a bank account."}, {"word": "accurate", "pos": "adj.", "level": "B2", "thai": "แม่นยำ, ถูกต้อง", "example": "an accurate description/picture of something"}, {"word": "accuse", "pos": "v.", "level": "B2", "thai": "กล่าวหา", "example": "accuse somebody of something, to accuse somebody of murder/a crime"}, {"word": "achieve", "pos": "v.", "level": "A2", "thai": "บรรลุผล, สำเร็จ", "example": "He had finally achieved success."}, {"word": "achievement", "pos": "n.", "level": "B1", "thai": "ความสำเร็จ", "example": "Winning the scholarship was a remarkable achievement for her."}, {"word": "acknowledge", "pos": "v.", "level": "B2", "thai": "ยอมรับ, ตอบรับ", "example": "The government refused to acknowledge the results of the election."}, {"word": "acquire", "pos": "v.", "level": "B2", "thai": "ได้รับมา, เรียนรู้", "example": "Reading daily is an effective way to acquire a large vocabulary."}, {"word": "across", "pos": "prep., adv.", "level": "A1", "thai": "ข้าม, ฝั่งตรงข้าม", "example": "We walked across the bridge to get to the other side of the river."}, {"word": "act", "pos": "v.", "level": "A2", "thai": "แสดง, กระทำ", "example": "The actor acted his part with great skill and emotion."}, {"word": "action", "pos": "n.", "level": "A1", "thai": "การกระทำ", "example": "Immediate action is required to prevent further environmental damage."}, {"word": "active", "pos": "adj.", "level": "A2", "thai": "คล่องแคล่ว, กระตือรือร้น", "example": "He remains active despite his old age by jogging every morning."}, {"word": "activity", "pos": "n.", "level": "A1", "thai": "กิจกรรม", "example": "The school offers a variety of extracurricular activities for students."}, {"word": "actor", "pos": "n.", "level": "A1", "thai": "นักแสดงชาย", "example": "The lead actor delivered a powerful performance in the new movie."}, {"word": "actress", "pos": "n.", "level": "A1", "thai": "นักแสดงหญิง", "example": "She is a talented actress who has won several prestigious awards."}, {"word": "actual", "pos": "adj.", "level": "B2", "thai": "ตามความเป็นจริง, ที่เกิดขึ้นจริง", "example": "The actual cost of the project was much higher than the initial estimate."}, {"word": "actually", "pos": "adv.", "level": "A2", "thai": "จริงๆ แล้ว", "example": "I actually enjoyed the movie more than I thought I would."}, {"word": "ad", "pos": "n.", "level": "B1", "thai": "การโฆษณา (คำย่อของ advertisement)", "example": "I saw an ad for a new smartphone on social media today."}, {"word": "adapt", "pos": "v.", "level": "B2", "thai": "ปรับตัว, ปรับเปลี่ยน", "example": "It can be difficult to adapt to a new culture when living abroad."}, {"word": "add", "pos": "v.", "level": "A1", "thai": "เพิ่ม, บวก", "example": "Please add some sugar to the coffee to make it less bitter."}, {"word": "addition", "pos": "n.", "level": "B1", "thai": "การเพิ่ม, ส่วนที่เพิ่มเข้ามา", "example": "In addition to his salary, he receives a monthly travel allowance."}, {"word": "additional", "pos": "adj.", "level": "B2", "thai": "เพิ่มเติม", "example": "The company decided to hire additional staff to handle the workload."}, {"word": "address", "pos": "n.", "level": "A1", "thai": "ที่อยู่", "example": "Please write your home address clearly on the application form."}, {"word": "adjust", "pos": "v.", "level": "A2", "thai": "ปรับปรุง, ปรับเปลี่ยน", "example": "The mechanic had to adjust the car's engine to make it run smoothly."}, {"word": "administration", "pos": "n.", "level": "B1", "thai": "การบริหาร, การจัดการ", "example": "The new administration promised to improve the city's public transport system."}, {"word": "admire" e of his health."}, {"word": "affair", "pos": "n.", "level": "B2", "thai": "เหตุการณ์, เรื่องราว", "example": "The scandal was a major affair that dominated the news for weeks."}, {"word": "affect", "pos": "v.", "level": "A2", "thai": "ส่งผลกระทบ", "example": "The economic crisis will affect many small businesses in the region."}, {"word": "afford", "pos": "v.", "level": "B1", "thai": "สามารถจ่ายได้, มีกำลังทรัพย์", "example": "Many young people cannot afford to buy their own homes nowadays."}, {"word": "afraid", "pos": "adj.", "level": "A1", "thai": "กลัว", "example": "She is afraid of spiders and always screams when she sees one."}, {"word": "after", "pos": "prep.", "level": "A1", "thai": "หลังจาก", "example": "We went for a walk in the park after finishing our dinner."}, {"word": "afternoon", "pos": "n.", "level": "A1", "thai": "ตอนบ่าย", "example": "I usually feel sleepy in the afternoon after having a heavy lunch."}, {"word": "afterward", "pos": "adv.", "level": "B2", "thai": "ภายหลัง, หลังจากนั้น", "example": "We had dinner first and went to the cinema afterward."}, {"word": "again", "pos": "adv.", "level": "A1", "thai": "อีกครั้ง", "example": "Please try to do the exercise again until you get it right."}, {"word": "against", "pos": "prep.", "level": "A2", "thai": "ต่อต้าน, กับ", "example": "The protest was against the government's new tax policy."}, {"word": "age", "pos": "n.", "level": "A1", "thai": "อายุ, ยุคสมัย", "example": "The average age of students in this class is around 20 years old."}, {"word": "agency", "pos": "n.", "level": "B2", "thai": "ตัวแทน, หน่วยงาน", "example": "She works for an advertising agency."}, {"word": "agenda", "pos": "n.", "level": "B2", "thai": "วาระการประชุม", "example": "The next item on the agenda is the budget for the upcoming project."}, {"word": "agent", "pos": "n.", "level": "B1", "thai": "ตัวแทน", "example": "Our agent in New York deals with all US sales."}, {"word": "aggressive", "pos": "adj.", "level": "B2", "thai": "ก                 const pageNum = Math.floor(idx / 300) + 1;
                const key = w.word + "_" + w.pos;
                if (!pageStats[pageNum]) pageStats[pageNum] = { mastered: 0, total: 0 };
                pageStats[pageNum].total++;
                if (mastery[key]) pageStats[pageNum].mastered++;
            });

            for (let page in pageStats) {
                report += `Page ${page}: ${pageStats[page].mastered}/${pageStats[page].total}\n`;
            }
            report += "MASTERY_REPORT_END";
            
            const area = document.getElementById('exportArea');
            area.value = report;
            area.style.display = 'block';
            area.select();
        }

        updateCard();
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') nextCard();
            if (e.key === 'ArrowLeft') prevCard();
            if (e.key === 'ArrowUp' || e.key === 'ArrowDown') flipCard();
            if (e.key === 'Enter') markMastery(true);
            if (e.key === 'v' || e.key === 'V') speakWord();
        });
    </script>
</body>
</html>
