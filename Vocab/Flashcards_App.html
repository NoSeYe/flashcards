
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oxford 3000 Flashcards</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            padding-top: 20px;
        }
        .container {
            text-align: center;
            width: 90%;
            max-width: 500px;
        }
        .flashcard-container {
            perspective: 1000px;
            width: 100%;
            height: 350px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            border-radius: 15px;
        }
        .flashcard.flipped {
            transform: rotateY(180deg);
        }
        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            padding: 20px;
            box-sizing: border-box;
        }
        .front {
            background-color: #ffffff;
            color: #333;
            border: 2px solid #ddd;
        }
        .back {
            background-color: #4a90e2;
            color: white;
            transform: rotateY(180deg);
        }
        .word { font-size: 2.8em; font-weight: bold; margin-bottom: 10px; }
        .level { font-size: 1.2em; color: #666; margin-bottom: 5px; }
        .group { font-size: 1em; color: #888; }
        .thai { font-size: 2em; margin-bottom: 15px; }
        .example { font-style: italic; font-size: 1.1em; line-height: 1.4; opacity: 0.9; }
        
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 10px;
            margin-bottom: 20px;
        }
        .mastery-controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 25px;
            font-size: 1em;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #333;
            color: white;
            transition: all 0.2s;
        }
        button:hover { background-color: #555; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        
        .btn-know { background-color: #28a745; font-size: 1.2em; }
        .btn-dont-know { background-color: #dc3545; font-size: 1.2em; }
        .btn-know:hover { background-color: #218838; }
        .btn-dont-know:hover { background-color: #c82333; }
        
        .stats { margin-top: 10px; color: #555; font-weight: 500; }
        .mastery-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 1.5em;
            display: none;
        }
        .is-mastered .mastery-badge { display: block; }
        .is-mastered .front { border-color: #28a745; background-color: #f8fff9; }

        .export-section {
            margin-top: 30px;
            padding: 20px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        #exportArea {
            width: 100%;
            height: 80px;
            margin-top: 10px;
            display: none;
            font-family: monospace;
            font-size: 0.9em;
        }
    </style>
</head>

        <div class="controls">

                currentIndex = index;
                updateCard();
            }
        }

        function exportProgress() {
            const pageStats = {};
            words.forEach(w => {
                const key = w.word + "_" + w.page;
                if (!pageStats[w.page]) pageStats[w.page] = { mastered: 0, total: 0 };
                pageStats[w.page].total++;
                if (mastery[key]) pageStats[w.page].mastered++;
            });

            let report = "MASTERY_REPORT_START\n";
            for (let page in pageStats) {
                report += `Page ${page}: ${pageStats[page].mastered}/${pageStats[page].total}\n`;
            }
            report += "MASTERY_REPORT_END";
            
            const area = document.getElementById('exportArea');
            area.value = report;
            area.style.display = 'block';
            area.select();
        }

        // Initialize
        updateCard();
        
        // Key navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') nextCard();
            if (e.key === 'ArrowLeft') prevCard();
            if (e.key === 'ArrowUp' || e.key === 'ArrowDown') flipCard();
            if (e.key === 'Enter') markMastery(true);
        });
    </script>
</body>
</html>
